<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Naval Defence Alliance Management Tool — loading</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      color: #eee;
      background: transparent;
      user-select: none;
      cursor: default;
      overflow: hidden;
    }
    .splash {
      box-sizing: border-box;
      height: 100%;
      width: 100%;
      padding: 22px 26px 22px;
      background: linear-gradient(160deg, #1e2a24 0%, #141414 100%);
      border: 1px solid #333;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-app-region: drag;
    }
    .header { display: flex; align-items: center; gap: 14px; }
    .header img { width: 52px; height: 52px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); flex-shrink: 0; }
    .heading { flex: 1; min-width: 0; }
    .title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .title { font-size: 1.05em; font-weight: 600; letter-spacing: 0.2px; line-height: 1.25; }
    .version-pill {
      display: inline-block;
      padding: 0.15em 0.55em;
      font-size: 0.7em;
      font-weight: 500;
      color: #cfd;
      background: #1a3a2a;
      border: 1px solid #2d5a44;
      border-radius: 999px;
      letter-spacing: 0.3px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .version-pill[hidden] { display: none; }
    .byline { font-size: 0.8em; color: #aab; margin-top: 4px; }
    .byline strong { color: #cfd; font-weight: 600; }

    .progress-wrap { margin-top: auto; }
    .progress-bar {
      height: 10px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a8 0%, #6cb 100%);
      transition: width 200ms ease-out;
    }
    .progress-fill.indeterminate {
      width: 35%;
      animation: slide 1.2s ease-in-out infinite;
      background: linear-gradient(90deg, transparent, #4a8, transparent);
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(285%); }
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85em;
    }
    .step {
      color: #cfd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .pct { color: #8aa; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="header">
      <img src="../assets/icon-128.png" alt="" />
      <div class="heading">
        <div class="title-row">
          <div class="title">Naval Defence Alliance Management Tool</div>
          <span class="version-pill" id="version-pill" hidden></span>
        </div>
        <div class="byline">by <strong id="author-name">—</strong></div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div id="fill" class="progress-fill indeterminate"></div></div>
      <div class="status-row">
        <span id="step" class="step">Initializing…</span>
        <span id="pct" class="pct"></span>
      </div>
    </div>
  </div>
  <script>
    const fill = document.getElementById('fill');
    const stepEl = document.getElementById('step');
    const pctEl = document.getElementById('pct');
    const versionPill = document.getElementById('version-pill');
    const authorName = document.getElementById('author-name');
    window.splashApi?.onMeta(({ version, author }) => {
      if (version) {
        versionPill.textContent = 'v' + version;
        versionPill.hidden = false;
      }
      if (author) authorName.textContent = author;
    });
    window.splashApi?.onProgress(({ pct: p, step: s }) => {
      if (typeof p === 'number') {
        fill.classList.remove('indeterminate');
        fill.style.width = Math.max(0, Math.min(100, p)) + '%';
        pctEl.textContent = Math.round(p) + '%';
      }
      if (typeof s === 'string') stepEl.textContent = s;
    });
  </script>
</body>
</html>
